<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>おミクじ</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #fffeec;
        }

        .hub-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1;
            padding: 8px 10px;
            color: #fffeec;
            text-decoration: none;
            font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
            font-weight: 700;
            background: #137a7f;
            border-radius: 4px;
        }

        .hub-link:hover,
        .hub-link:focus {
            text-decoration: underline;
        }

        img {
            max-width: min(100%, 720px);
            height: auto;
        }

<body>
    <a class="hub-link" href="../">KaicoHubにもどる</a>
    <img src="omikuzi_animation.gif" alt="おミクじ抽選中">

    <script>
        setTimeout(function () {
            window.location.href = "omikuzi_result.html" + window.location.search;
        }, 3000);
